name: Publish NuGet

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ComponentRouting.Maui.Tests/ComponentRouting.Maui.Tests.csproj

      - name: Build library
        run: dotnet build ComponentRouting.Maui/ComponentRouting.Maui.csproj -f net10.0 -c Release --no-restore

      - name: Test
        run: dotnet test ComponentRouting.Maui.Tests/ComponentRouting.Maui.Tests.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack ComponentRouting.Maui/ComponentRouting.Maui.csproj -c Release -o artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Publish package
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbols
        run: dotnet nuget push "artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
