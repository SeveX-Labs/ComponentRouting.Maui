name: Publish NuGet

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore tests
        run: dotnet restore ComponentRouting.Maui.Tests/ComponentRouting.Maui.Tests.csproj
      - name: Test
        run: dotnet test ComponentRouting.Maui.Tests/ComponentRouting.Maui.Tests.csproj -c Release --no-restore
      - name: Install MAUI workloads
        run: dotnet workload install maui --skip-manifest-update
      - name: Restore library
        run: dotnet restore ComponentRouting.Maui/ComponentRouting.Maui.csproj
      - name: Build Android library
        run: dotnet build ComponentRouting.Maui/ComponentRouting.Maui.csproj -f net10.0-android -c Release --no-restore -m:1 -v:n -p:UseSharedCompilation=false -p:ContinuousIntegrationBuild=true
      - name: Build iOS library
        run: dotnet build ComponentRouting.Maui/ComponentRouting.Maui.csproj -f net10.0-ios -c Release --no-restore -m:1 -v:n -p:UseSharedCompilation=false -p:ContinuousIntegrationBuild=true
      - name: Build MacCatalyst library
        run: dotnet build ComponentRouting.Maui/ComponentRouting.Maui.csproj -f net10.0-maccatalyst -c Release --no-restore -m:1 -v:n -p:UseSharedCompilation=false -p:ContinuousIntegrationBuild=true
      - name: Pack
        run: dotnet pack ComponentRouting.Maui/ComponentRouting.Maui.csproj -c Release -o artifacts --no-build -p:ContinuousIntegrationBuild=true
      - name: Verify package contents
        run: |
          package_path=$(find artifacts -maxdepth 1 -name 'ComponentRouting.Maui.*.nupkg' ! -name '*.snupkg' -print -quit)
          scripts/verify-package-contents.sh "$package_path"
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
      - name: Publish package
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Publish symbols
        run: dotnet nuget push "artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
