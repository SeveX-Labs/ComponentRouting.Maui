name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tests
        run: dotnet restore ComponentRouting.Maui.Tests/ComponentRouting.Maui.Tests.csproj

      - name: Test
        run: dotnet test ComponentRouting.Maui.Tests/ComponentRouting.Maui.Tests.csproj -c Release --no-restore

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore Android library
        run: dotnet restore ComponentRouting.Maui/ComponentRouting.Maui.csproj -p:TargetFrameworks=net10.0-android

      - name: Build Android library
        run: dotnet build ComponentRouting.Maui/ComponentRouting.Maui.csproj -f net10.0-android -c Release --no-restore -m:1 -v:n -p:UseSharedCompilation=false

      - name: Restore Android sample
        run: dotnet restore SAMPLE/ComponentRouting.Maui.Sample/ComponentRouting.Maui.Sample.csproj -p:TargetFrameworks=net10.0-android

      - name: Build Android sample
        run: dotnet build SAMPLE/ComponentRouting.Maui.Sample/ComponentRouting.Maui.Sample.csproj -f net10.0-android -c Release --no-restore -m:1 -v:n -p:UseSharedCompilation=false
